<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <h1>My To-Do List</h1>
    <p class="subtitle">Built with DOM manipulation & event listeners</p>

    <!-- STATS -->
    <section class="stats">
      <p>Total <span id="total">0</span></p>
      <p>Active <span id="active">0</span></p>
      <p>Completed <span id="completed">0</span></p>
    </section>

    <!-- INPUT -->
    <section class="input-area">
      <input type="text" id="taskInput" placeholder="Add a new task...">
      <button id="addBtn">Add Task</button>
    </section>

    <!-- FILTERS -->
    <nav class="filters">
      <button id="allBtn" class="active">ALL</button>
      <button id="activeBtn">ACTIVE</button>
      <button id="completedBtn">COMPLETED</button>
    </nav>

    <!-- TASKS -->
      <ul id="taskList"></ul>

    <!-- CLEAR -->
    <button id="clearCompleted">Clear Completed</button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
